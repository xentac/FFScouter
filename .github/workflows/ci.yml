name: CI

on:
  push:
    branches: [main, modernize]
  pull_request:

# Cancel superseded runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to match the version used locally (see package.json / bun.lock).
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Three-part lint: biome, tsc --noEmit, and react-doctor (--blocking error).
      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test --run

      # Smoke-test the userscript build (vite + vite-plugin-monkey).
      - name: Build
        run: bun run build

  audit:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Advisory only: surfaces the current vulnerability baseline in the logs.
      # New vulnerable deps are gated on PRs by dependency-review.yml, and
      # Dependabot opens update PRs to clear the baseline over time.
      - name: bun audit
        run: bun audit
        continue-on-error: true
